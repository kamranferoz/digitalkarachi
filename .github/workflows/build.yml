name: Build only

on:
  push:
    branches: [main]
    paths:
      - "build.py"
      - "generators/**"
      - "content/**"
      - "scripts/**"
      - "posts_content.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: python3 build.py

      - name: Commit rebuilt site if changed
        run: |
          if [ -z "$(git status --porcelain site/)" ]; then
            echo "No site changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/
          git commit -m "chore(build): rebuild site"
          git push
